<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Produit — Hermabi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<style>
  /* Add to cart animation */
  #add-btn {
    transition: transform 0.2s ease;
  }
  
  /* Modal animation */
  #added-modal {
    animation: fadeIn 0.3s ease;
  }
  
  @keyframes fadeIn {
    from {
      opacity: 0;
    }
    to {
      opacity: 1;
    }
  }
  </style>
</head>
<body>

<div class="motif-strip"></div>
<header class="site-header">
  <nav class="nav">
    <a href="index.html" class="brand"><img src="images/logo.jpg" alt="Hermabi">HERMABI<small>Modern Moroccan Fashion</small></a>
    <div class="nav-links">
      <a href="shop.html">Boutique</a>
      <a href="shop.html?cat=Maillots">Maillots</a>
      <a href="shop.html?cat=Pantalons">Pantalons</a>
    </div>
    <div class="nav-right">
      <a href="cart.html" class="cart-link">Panier <span class="cart-count">0</span></a>
    </div>
  </nav>
</header>

<div class="wrap" id="pd-root"></div>

<footer>
  <div class="wrap">
    <div class="footer-bottom">
      <span>© 2026 Hermabi. Tous droits réservés.</span>
      <span>Tetouane, Maroc</span>
    </div>
  </div>
</footer>

<script src="js/store.js"></script>
<script>
  const params = new URLSearchParams(location.search);
  const productId = parseInt(params.get('id')); // Convert string to number
  const product = getProduct(productId);
  const root = document.getElementById('pd-root');

  if(!product){
    root.innerHTML = `<div class="empty-state"><h3>Produit introuvable</h3><p>Ce produit n'existe pas ou plus.</p><a href="shop.html" class="btn brass">Retour à la boutique</a></div>`;
  } else {
    document.title = product.name + " — Hermabi";
    root.innerHTML = `
      <div class="pd-grid">
        <div class="pd-media"><img src="${product.img}" alt="${product.name}"></div>
        <div>
          <div class="pd-cat">${product.cat}</div>
          <h1 class="pd-title">${product.name}</h1>
          <div class="pd-price">${fmtPrice(product.price)}</div>
          <p class="pd-desc">${product.desc}</p>

          <div class="pd-row">
            <div>
              <label style="font-size:12px; letter-spacing:.06em; text-transform:uppercase; font-weight:600; display:block; margin-bottom:8px;">Taille</label>
              <select id="size-select" style="width:140px;">
                <option>S</option><option selected>M</option><option>L</option><option>XL</option>
              </select>
            </div>
            <div>
              <div>
  <label style="font-size:12px; letter-spacing:.06em; text-transform:uppercase; font-weight:600; display:block; margin-bottom:8px;">Quantité</label>
  <select id="qty-select" style="width: 100px; padding: 8px; border: 1px solid var(--line); border-radius: 4px; font-size: 14px;">
    <option value="1">1 article</option>
    <option value="2">2 articles</option>
    <option value="3">3 articles</option>
    <option value="4">4 articles</option>
    <option value="5">5 articles</option>
  </select>
</div>
          </div>

          <button class="btn brass block" id="add-btn">Ajouter au panier</button>

          <div class="pd-meta">
            <div>🇲🇦 Expédié depuis Tetouane — livraison 2 à 4 jours ouvrés</div>
            <div>💳 Virement RIB ou paiement à la livraison</div>
            <div>↩ Retours acceptés sous 14 jours</div>
          </div>
        </div>
      </div>
    `;

    let qty = 1;
const qtySelect = document.getElementById('qty-select');
qtySelect.addEventListener('change', () => {
  qty = parseInt(qtySelect.value);
});
document.getElementById('add-btn').addEventListener('click', () => {
  qty = parseInt(qtySelect.value);
  
  // Add animation
  const btn = document.getElementById('add-btn');
  btn.style.transform = 'scale(1.05)';
  btn.style.boxShadow = '0 0 20px var(--brass)';
  
  setTimeout(() => {
    btn.style.transform = 'scale(1)';
    btn.style.boxShadow = 'none';
  }, 300);
  
  // Add to cart
  addToCart(product.id, qty);
  
  // Show modal
  showAddedModal(product.name, qty);
});
  }
  function showAddedModal(productName, qty) {
  document.getElementById('added-text').textContent = `${productName} × ${qty}`;
  document.getElementById('added-modal').style.display = 'flex';
  
  // Auto-close after 5 seconds if user doesn't click
  setTimeout(() => {
    document.getElementById('added-modal').style.display = 'none';
  }, 5000);
}
</script>
<!-- Product Added Modal - Better Design -->
<div id="added-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center;">
  <div style="background: linear-gradient(135deg, var(--stucco-dim) 0%, var(--stucco) 100%); padding: 50px 40px; border-radius: 16px; text-align: center; max-width: 450px; border: 2px solid var(--brass); box-shadow: 0 20px 60px rgba(0,0,0,0.5); animation: popUp 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);">
    <div style="font-size: 64px; margin-bottom: 20px; animation: scaleUp 0.6s ease-out;">✓</div>
    <h2 style="color: var(--brass); margin-bottom: 10px; font-size: 28px;" id="added-text"></h2>
    <p style="color: var(--cream); margin-bottom: 30px; font-size: 16px;">ajouté à votre panier</p>
    <div style="display: flex; gap: 15px;">
      <button onclick="document.getElementById('added-modal').style.display='none'; location.href='shop.html'" style="flex: 1; padding: 14px; background: var(--line); color: var(--text); border: none; border-radius: 8px; cursor: pointer; font-weight: 600; transition: all 0.3s;">Continuer</button>
      <button onclick="document.getElementById('added-modal').style.display='none'; location.href='cart.html'" style="flex: 1; padding: 14px; background: var(--brass); color: var(--ink); border: none; border-radius: 8px; cursor: pointer; font-weight: 600; transition: all 0.3s;">Voir Panier</button>
    </div>
  </div>
</div>

<style>
@keyframes popUp {
  0% {
    opacity: 0;
    transform: scale(0.8);
  }
  100% {
    opacity: 1;
    transform: scale(1);
  }
}

@keyframes scaleUp {
  0% {
    transform: scale(0);
  }
  50% {
    transform: scale(1.2);
  }
  100% {
    transform: scale(1);
  }
}
</style>
</div>
</body>
</html>
