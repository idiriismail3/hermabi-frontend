<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Commande — Hermabi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="motif-strip"></div>
<header class="site-header">
  <nav class="nav">
    <a href="index.html" class="brand"><img src="images/logo.jpg" alt="Hermabi">HERMABI<small>Modern Moroccan Fashion</small></a>
    <div class="nav-links">
      <a href="shop.html">Boutique</a>
      <a href="shop.html?cat=Maillots">Maillots</a>
      <a href="shop.html?cat=Pantalons">Pantalons</a>
    </div>
    <div class="nav-right">
      <a href="cart.html" class="cart-link">Panier <span class="cart-count">0</span></a>
    </div>
  </nav>
</header>

<div class="wrap" id="checkout-root"></div>

<footer style="margin-top:60px;">
  <div class="wrap">
    <div class="footer-bottom">
      <span>© 2026 Hermabi. Tous droits réservés.</span>
      <span>Casablanca, Maroc</span>
    </div>
  </div>
</footer>

<script src="js/store.js"></script>
<script>
const root = document.getElementById('checkout-root');

function renderCheckoutForm(){
  const cart = getCart();
  if(cart.length === 0){
    root.innerHTML = `<div class="empty-state"><h3>Votre panier est vide</h3><p>Les options de paiement s'affichent une fois qu'il y a au moins un article dans votre panier. Ajoutez un produit puis revenez ici.</p><a href="shop.html" class="btn brass">Aller à la boutique</a></div>`;
    return;
  }

  const sub = cartSubtotal(), ship = shippingCost(), total = cartTotal();
  const lines = cart.map(item => {
    const p = getProduct(item.id);
    return `<div class="summary-row"><span>${p.name} × ${item.qty}</span><span>${fmtPrice(p.price*item.qty)}</span></div>`;
  }).join('');

  root.innerHTML = `
    <h1 style="padding-top:50px; font-size:34px;">Finaliser la commande</h1>
    <div class="checkout-layout">
      <form id="checkout-form" novalidate>
        <div class="form-block">
          <h3><span class="num">1</span> Coordonnées</h3>
          <div class="field-row">
            <div class="field" data-field="fullname">
              <label>Nom complet <span class="req">*</span></label>
              <input type="text" name="fullname" placeholder="Votre nom">
              <span class="error-msg">Merci d'indiquer votre nom.</span>
            </div>
            <div class="field" data-field="phone">
              <label>Téléphone <span class="req">*</span></label>
              <input type="tel" name="phone" placeholder="06 00 00 00 00">
              <span class="error-msg">Numéro de téléphone invalide.</span>
            </div>
          </div>
          <div class="field-row">
            <div class="field" data-field="email" style="grid-column: 1 / -1;">
              <label>Email <span class="req">*</span></label>
              <input type="email" name="email" placeholder="vous@email.com">
              <span class="error-msg">Email invalide.</span>
            </div>
          </div>
        </div>

        <div class="form-block">
          <h3><span class="num">2</span> Adresse de livraison</h3>
          <div class="field-row">
            <div class="field" data-field="address" style="grid-column: 1 / -1;">
              <label>Adresse <span class="req">*</span></label>
              <input type="text" name="address" placeholder="Rue, numéro, appartement">
              <span class="error-msg">Merci d'indiquer une adresse.</span>
            </div>
          </div>
          <div class="field-row">
            <div class="field" data-field="city">
              <label>Ville <span class="req">*</span></label>
              <input type="text" name="city" placeholder="Casablanca">
              <span class="error-msg">Merci d'indiquer votre ville.</span>
            </div>
            <div class="field" data-field="postal">
              <label>Code postal</label>
              <input type="text" name="postal" placeholder="20000">
            </div>
          </div>
        </div>

        <div class="form-block">
          <h3><span class="num">3</span> Mode de paiement</h3>
          <p style="font-size:13px; color:var(--muted); margin:-8px 0 16px;">Choisissez une option ci-dessous — cliquez sur "Carte bancaire" pour afficher les champs de saisie de votre carte.</p>
          <div class="pay-options">
            <label class="pay-option selected" data-opt="cod">
              <input type="radio" name="payment" value="cod" checked>
              <div>
                <div class="title">💵 Paiement à la livraison</div>
                <div class="desc">Payez en espèces au livreur à la réception de votre colis.</div>
              </div>
            </label>
            <label class="pay-option" data-opt="card">
              <input type="radio" name="payment" value="card">
              <div style="width:100%;">
                <div class="title">💳 Carte bancaire</div>
                <div class="desc">Paiement sécurisé via CMI (Visa / Mastercard). Cliquez ici pour saisir votre carte.</div>
                <div class="card-fields" id="card-fields">
                  <div class="field-row" style="margin-top:14px;">
                    <div class="field" style="grid-column: 1 / -1;">
                      <label>Numéro de carte</label>
                      <input type="text" name="cardnum" placeholder="•••• •••• •••• ••••" inputmode="numeric" maxlength="19">
                    </div>
                  </div>
                  <div class="field-row">
                    <div class="field"><label>Expiration</label><input type="text" name="cardexp" placeholder="MM/AA"></div>
                    <div class="field"><label>CVC</label><input type="text" name="cardcvc" placeholder="123" maxlength="4"></div>
                  </div>
                </div>
              </div>
            </label>
          </div>
        </div>

        <button type="submit" class="btn brass block">Confirmer la commande — ${fmtPrice(total)}</button>
      </form>

      <div class="summary">
        <h3>Votre commande</h3>
        ${lines}
        <div class="summary-row" style="border-top:1px solid var(--line); padding-top:14px; margin-top:6px;"><span>Sous-total</span><span>${fmtPrice(sub)}</span></div>
        <div class="summary-row"><span>Livraison</span><span>${ship===0?'Offerte':fmtPrice(ship)}</span></div>
        <div class="summary-row total"><span>Total</span><span>${fmtPrice(total)}</span></div>
      </div>
    </div>
  `;

  // Payment option toggle
  document.querySelectorAll('.pay-option').forEach(opt => {
    opt.addEventListener('click', () => {
      document.querySelectorAll('.pay-option').forEach(o => o.classList.remove('selected'));
      opt.classList.add('selected');
      opt.querySelector('input').checked = true;
      document.getElementById('card-fields').classList.toggle('show', opt.dataset.opt === 'card');
    });
  });

  document.getElementById('checkout-form').addEventListener('submit', handleSubmit);
}

function validate(form){
  let valid = true;
  const required = ['fullname','phone','email','address','city'];
  required.forEach(name => {
    const field = form.querySelector(`[data-field="${name}"]`);
    const input = form.querySelector(`[name="${name}"]`);
    let ok = input.value.trim().length > 0;
    if(name === 'email' && ok) ok = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(input.value.trim());
    if(name === 'phone' && ok) ok = input.value.replace(/\D/g,'').length >= 9;
    field.classList.toggle('invalid', !ok);
    if(!ok) valid = false;
  });

  const payment = form.querySelector('[name="payment"]:checked').value;
  if(payment === 'card'){
    const cardnum = form.querySelector('[name="cardnum"]').value.replace(/\s/g,'');
    const cardexp = form.querySelector('[name="cardexp"]').value;
    const cardcvc = form.querySelector('[name="cardcvc"]').value;
    if(cardnum.length < 13 || cardexp.length < 4 || cardcvc.length < 3) valid = false;
    // NOTE: Real card processing must never be validated/charged client-side.
    // This is a placeholder UI — see README for CMI backend integration.
  }
  return valid;
}

function handleSubmit(e){
  e.preventDefault();
  const form = e.target;
  if(!validate(form)){
    showToast('Merci de vérifier les champs en rouge.');
    return;
  }

  const cart = getCart();
  if(cart.length === 0){
    showToast('Votre panier est vide.');
    return;
  }

  const payment = form.querySelector('[name="payment"]:checked').value;
  const customer = {
    fullname: form.querySelector('[name="fullname"]').value.trim(),
    email: form.querySelector('[name="email"]').value.trim(),
    phone: form.querySelector('[name="phone"]').value.trim(),
    address: form.querySelector('[name="address"]').value.trim(),
    city: form.querySelector('[name="city"]').value.trim(),
  };
  
  const total = cartTotal();

  const submitBtn = form.querySelector('button[type="submit"]');
  const originalText = submitBtn.textContent;
  submitBtn.disabled = true;
  submitBtn.textContent = 'Traitement en cours...';

  fetch('http://localhost:3000/api/checkout', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
    },
    body: JSON.stringify({
      customer: customer,
      items: cart.map(item => {
        const p = getProduct(item.id);
        return {
          id: item.id,
          name: p.name,
          qty: item.qty,
          price: p.price,
        };
      }),
      subtotal: cartSubtotal(),
      shipping: shippingCost(),
      total: total,
      paymentMethod: payment,
    }),
  })
  .then(res => res.json())
  .then(data => {
    if (!data.success) {
      showToast('Erreur: ' + (data.error || 'Erreur inconnue'));
      submitBtn.disabled = false;
      submitBtn.textContent = originalText;
      return;
    }

    saveCart([]);

    if (payment === 'cod') {
      showConfirmation(data.orderId, total, 'cod');
      return;
    }

    if (payment === 'card') {
      showConfirmation(data.orderId, total, 'card');
      return;
    }
  })
  .catch(error => {
    console.error('Checkout error:', error);
    showToast('Erreur serveur. Vérifiez que le backend est lancé (npm start).');
    submitBtn.disabled = false;
    submitBtn.textContent = originalText;
  });
}

function showCardRedirectScreen(orderRef, total){
  root.innerHTML = `
    <div class="confirm-box">
      <div class="icon">🔒</div>
      <h2>Redirection vers le paiement sécurisé…</h2>
      <p>Dans une boutique en ligne réelle, vous seriez redirigé ici vers la page de paiement sécurisée CMI pour saisir vos informations de carte. Aucune donnée de carte n'est traitée par ce site directement.</p>
      <div class="order-ref">Référence commande : ${orderRef}</div>
      <p style="margin-top:24px; font-size:13px;">Montant à régler : <strong>${fmtPrice(total)}</strong></p>
      <a href="index.html" class="btn brass" style="margin-top:10px;">Retour à l'accueil</a>
    </div>
  `;
}

function showConfirmation(orderRef, total, method){
  root.innerHTML = `
    <div class="confirm-box">
      <div class="icon">✓</div>
      <h2>Merci pour votre commande !</h2>
      <p>${method === 'cod' ? "Votre commande est confirmée. Préparez le montant en espèces — le livreur l'encaissera à la réception de votre colis." : 'Votre paiement a été confirmé.'}</p>
      <div class="order-ref">Référence commande : ${orderRef}</div>
      <p style="margin-top:24px; font-size:13px;">Total réglé ${method==='cod' ? 'à la livraison' : ''} : <strong>${fmtPrice(total)}</strong></p>
      <a href="shop.html" class="btn brass" style="margin-top:10px;">Continuer mes achats</a>
    </div>
  `;
}

renderCheckoutForm();
</script>
</body>
</html>
