<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panier — Hermabi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="motif-strip"></div>
<header class="site-header">
  <nav class="nav">
    <a href="index.html" class="brand"><img src="images/logo.jpg" alt="Hermabi">HERMABI<small>Modern Moroccan Fashion</small></a>
    <div class="nav-links">
      <a href="shop.html">Boutique</a>
      <a href="shop.html?cat=Maillots">Maillots</a>
      <a href="shop.html?cat=Pantalons">Pantalons</a>
    </div>
    <div class="nav-right">
      <a href="cart.html" class="cart-link">Panier <span class="cart-count">0</span></a>
    </div>
  </nav>
</header>

<div class="wrap">
  <h1 style="padding-top:50px; font-size:34px;">Votre panier</h1>
  <div id="cart-root"></div>
</div>

<footer style="margin-top:60px;">
  <div class="wrap">
    <div class="footer-bottom">
      <span>© 2026 Hermabi. Tous droits réservés.</span>
      <span>Tetouane, Maroc</span>
    </div>
  </div>
</footer>

<script src="js/store.js"></script>
<script>
  function render(){
    const cart = getCart();
    const root = document.getElementById('cart-root');
    if(cart.length === 0){
      root.innerHTML = `
        <div class="empty-state">
          <h3>Votre panier est vide</h3>
          <p>Découvrez la collection et ajoutez vos pièces favorites.</p>
          <a href="shop.html" class="btn brass">Aller à la boutique</a>
        </div>`;
      return;
    }

    const lines = cart.map(item => {
      const p = getProduct(item.id);
      if(!p) return '';
      return `
        <div class="cart-line" data-id="${p.id}">
          <img src="${p.img}" alt="${p.name}">
          <div>
            <div class="name">${p.name}</div>
            <div class="meta">${p.cat} · ${fmtPrice(p.price)}</div>
            <button class="remove-btn" data-remove="${p.id}">Supprimer</button>
          </div>
          <div class="qty-stepper">
            <button type="button" data-dec="${p.id}">−</button>
            <input type="text" value="${item.qty}" readonly>
            <button type="button" data-inc="${p.id}">+</button>
          </div>
          <div style="font-weight:600;">${fmtPrice(p.price * item.qty)}</div>
        </div>
      `;
    }).join('');

    const sub = cartSubtotal();
    const ship = shippingCost();
    const total = cartTotal();

    root.innerHTML = `
      <div class="cart-layout">
        <div>${lines}</div>
        <div class="summary">
          <h3>Résumé de commande</h3>
          <div class="summary-row"><span>Sous-total</span><span>${fmtPrice(sub)}</span></div>
          <div class="summary-row"><span>Livraison</span><span>${ship === 0 ? 'Offerte' : fmtPrice(ship)}</span></div>
          ${sub < FREE_SHIPPING_THRESHOLD ? `<div class="summary-row" style="color:var(--brass); font-size:12px;"><span>Plus que ${fmtPrice(FREE_SHIPPING_THRESHOLD - sub)} pour la livraison offerte</span><span></span></div>` : ''}
          <div class="summary-row total"><span>Total</span><span>${fmtPrice(total)}</span></div>
          <a href="checkout.html" class="btn brass block" style="margin-top:20px;">Passer la commande</a>
          <a href="shop.html" class="skip" style="display:block; text-align:center; margin-top:16px;">Continuer mes achats</a>
        </div>
      </div>
    `;

    root.querySelectorAll('[data-inc]').forEach(b => b.addEventListener('click', () => {
      const id = b.dataset.inc; const item = getCart().find(i=>i.id===Number(id));
      updateCartQty(id, (item?.qty||0) + 1); render();
    }));
    root.querySelectorAll('[data-dec]').forEach(b => b.addEventListener('click', () => {
      const id = b.dataset.dec; const item = getCart().find(i=>i.id===Number(id));
      updateCartItemQty(Number(id), (item?.qty||1) - 1); render();
    }));
    root.querySelectorAll('[data-remove]').forEach(b => b.addEventListener('click', () => {
      removeFromCart(Number(b.dataset.remove)); render();
    }));
  }
  render();
</script>
</body>
</html>
