<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard — Hermabi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --stucco: #121110;
  --stucco-dim: #1B1815;
  --ink: #0A0908;
  --text: #EFE6D3;
  --brass: #C9A227;
  --cream: #F4ECDD;
  --line: #3A3327;
  --muted: #B8AD97;
  --error: #9C3B34;
}
body { font-family: 'Work Sans', sans-serif; background: var(--stucco); color: var(--text); }
.login-screen { display: flex; align-items: center; justify-content: center; height: 100vh; background: linear-gradient(135deg, var(--stucco) 0%, var(--stucco-dim) 100%); }
.login-box { background: var(--stucco-dim); padding: 40px; border-radius: 12px; width: 100%; max-width: 400px; border: 1px solid var(--line); }
.login-box h1 { font-size: 28px; color: var(--brass); margin-bottom: 30px; text-align: center; }
.login-box input { width: 100%; padding: 12px; margin-bottom: 15px; background: var(--stucco); border: 1px solid var(--line); border-radius: 6px; color: var(--text); }
.login-box button { width: 100%; padding: 12px; background: var(--brass); color: var(--ink); border: none; border-radius: 6px; font-weight: 600; cursor: pointer; }
.dashboard { display: none; } .dashboard.active { display: block; }
.header { background: var(--stucco-dim); padding: 20px 30px; border-bottom: 1px solid var(--line); display: flex; justify-content: space-between; }
.header h1 { color: var(--brass); }
.logout-btn { background: var(--error); color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; }
.nav-tabs { display: flex; background: var(--stucco-dim); padding: 0 30px; border-bottom: 1px solid var(--line); gap: 30px; }
.nav-tab { padding: 15px 0; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; font-weight: 600; }
.nav-tab.active { color: var(--brass); border-bottom-color: var(--brass); }
.content { padding: 30px; display: none; } .content.active { display: block; }
.btn-add { background: var(--brass); color: var(--ink); border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; font-weight: 600; margin-bottom: 20px; }
.products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; }
.product-card { background: var(--stucco-dim); padding: 20px; border-radius: 8px; border: 1px solid var(--line); }
.product-card img { width: 100%; height: 150px; object-fit: cover; border-radius: 6px; margin-bottom: 10px; }
.product-card input { width: 100%; padding: 8px; margin-bottom: 10px; background: var(--stucco); border: 1px solid var(--line); border-radius: 4px; color: var(--text); font-size: 12px; }
.product-card button { width: 100%; padding: 10px; background: var(--brass); color: var(--ink); border: none; border-radius: 4px; cursor: pointer; font-weight: 600; margin-bottom: 5px; }
.modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; align-items: center; justify-content: center; }
.modal.active { display: flex; }
.modal-content { background: var(--stucco-dim); padding: 30px; border-radius: 12px; width: 90%; max-width: 600px; border: 1px solid var(--line); max-height: 90vh; overflow-y: auto; }
.modal-content h2 { color: var(--brass); margin-bottom: 20px; }
.form-group { margin-bottom: 15px; }
.form-group label { display: block; color: var(--muted); font-size: 12px; margin-bottom: 5px; }
.form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px; background: var(--stucco); border: 1px solid var(--line); border-radius: 4px; color: var(--text); }
.image-preview { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px; }
.image-preview img { width: 100%; height: 100px; object-fit: cover; border-radius: 4px; }
.orders-table { width: 100%; border-collapse: collapse; background: var(--stucco-dim); border: 1px solid var(--line); }
.orders-table th { background: var(--ink); padding: 15px; text-align: left; color: var(--brass); font-weight: 700; border-bottom: 1px solid var(--line); }
.orders-table td { padding: 15px; border-bottom: 1px solid var(--line); font-size: 13px; }
.item-box { background: rgba(201,162,39,0.1); padding: 10px; border-radius: 4px; margin: 5px 0; font-size: 12px; }
.modal-actions { display: flex; gap: 10px; margin-top: 20px; }
.modal-actions button { flex: 1; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; }
.btn-save { background: var(--brass); color: var(--ink); }
.btn-cancel { background: var(--line); color: var(--text); }
</style>
</head>
<body>

<div id="login-screen" class="login-screen">
  <div class="login-box">
    <h1>Hermabi Admin</h1>
    <input type="password" id="login-password" placeholder="Mot de passe">
    <button onclick="login()">Connexion</button>
    <div id="login-error" style="color: var(--error); margin-top: 10px;"></div>
  </div>
</div>

<div id="dashboard" class="dashboard">
  <div class="header">
    <h1>Admin Dashboard</h1>
    <button class="logout-btn" onclick="logout()">Déconnexion</button>
  </div>

  <div class="nav-tabs">
    <div class="nav-tab active" onclick="switchTab('products')">📦 Produits</div>
    <div class="nav-tab" onclick="switchTab('orders')">📋 Commandes</div>
  </div>

  <div id="products-tab" class="content active">
    <h2 style="color: var(--brass); margin-bottom: 20px;">Gestion des Produits</h2>
    <button class="btn-add" onclick="openAddProductModal()">+ Ajouter un Produit</button>
    <div class="products-grid" id="products-grid"></div>
  </div>

  <div id="orders-tab" class="content">
    <h2 style="color: var(--brass); margin-bottom: 20px;">Toutes les Commandes</h2>
    <div id="orders-container"></div>
  </div>
</div>

<div id="product-modal" class="modal">
  <div class="modal-content">
    <h2 id="modal-title">Ajouter un Produit</h2>
    <div class="form-group">
      <label>Nom du Produit</label>
      <input type="text" id="prod-name">
    </div>
    <div class="form-group">
      <label>Catégorie</label>
      <select id="prod-category">
        <option value="Maillots">Maillots</option>
        <option value="Pantalons">Pantalons</option>
        <option value="Accessories">Accessories</option>
      </select>
    </div>
    <div class="form-group">
      <label>Prix (DHS)</label>
      <input type="number" id="prod-price">
    </div>
    <div class="form-group">
      <label>Stock</label>
      <input type="number" id="prod-stock">
    </div>
    <div class="form-group">
      <label>Description</label>
      <textarea id="prod-desc"></textarea>
    </div>
    <div class="form-group">
        <label>Photos (Référence - non stockées)</label>
        <p style="font-size: 11px; color: var(--muted);">Pour changer l'image du produit, remplacez le fichier dans le dossier /images</p>
        <input type="file" id="prod-images" accept="image/*" multiple disabled style="opacity: 0.5;">
      </div>
    <div class="modal-actions">
      <button class="btn-save" onclick="saveProduct()">Enregistrer</button>
      <button class="btn-cancel" onclick="closeProductModal()">Annuler</button>
    </div>
  </div>
</div>

<script src="js/store.js"></script>
<script>
const ADMIN_PASSWORD = 'hermabi2024';
let editingProductId = null;
let productImages = [];

function login() {
  const password = document.getElementById('login-password').value;
  if (password === ADMIN_PASSWORD) {
    sessionStorage.setItem('admin_logged_in', 'true');
    showDashboard();
  } else {
    document.getElementById('login-error').textContent = 'Mot de passe incorrect';
  }
}

function logout() {
  sessionStorage.removeItem('admin_logged_in');
  showLogin();
}

function showLogin() {
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('dashboard').classList.remove('active');
}

function showDashboard() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('dashboard').classList.add('active');
  loadProducts();
  loadOrders();
}

function switchTab(tab) {
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById(tab + '-tab').classList.add('active');
}

function openAddProductModal() {
  editingProductId = null;
  productImages = [];
  document.getElementById('modal-title').textContent = 'Ajouter un Produit';
  document.getElementById('prod-name').value = '';
  document.getElementById('prod-price').value = '';
  document.getElementById('prod-stock').value = '';
  document.getElementById('prod-desc').value = '';
  document.getElementById('prod-images').value = '';
  document.getElementById('product-modal').classList.add('active');
}

function closeProductModal() {
  document.getElementById('product-modal').classList.remove('active');
}

document.getElementById('prod-images').addEventListener('change', function(e) {
  productImages = [];
  document.getElementById('image-preview').innerHTML = '';
  Array.from(e.target.files).forEach(file => {
    const reader = new FileReader();
    reader.onload = function(event) {
      productImages.push(event.target.result);
      const img = document.createElement('img');
      img.src = event.target.result;
      document.getElementById('image-preview').appendChild(img);
    };
    reader.readAsDataURL(file);
  });
});

function saveProduct() {
  const name = document.getElementById('prod-name').value;
  const category = document.getElementById('prod-category').value;
  const price = parseInt(document.getElementById('prod-price').value);
  const stock = parseInt(document.getElementById('prod-stock').value);
  const desc = document.getElementById('prod-desc').value;
  
  if (!name || !price || !stock) {
    alert('Remplissez tous les champs');
    return;
  }
  
  if (!editingProductId && productImages.length === 0) {
    alert('Ajoutez au moins une image');
    return;
  }
  
  const products = getProducts();
  
  if (editingProductId) {
    const product = products.find(p => p.id === editingProductId);
    product.name = name;
    product.cat = category;
    product.price = price;
    product.stock = stock;
    product.desc = desc;
    // Don't save images - just use placeholder
    if (!product.img) {
      product.img = 'images/hermabi-01.jpg';
    }
  } else {
    const newId = Math.max(...products.map(p => p.id), 0) + 1;
    products.push({
      id: newId,
      name: name,
      cat: category,
      price: price,
      stock: stock,
      desc: desc,
      img: 'images/hermabi-01.jpg' // Use placeholder image
    });
  }
  
  saveProducts(products);
  loadProducts();
  closeProductModal();
  alert('Produit enregistré');
}

function loadProducts() {
  const products = getProducts();
  const grid = document.getElementById('products-grid');
  grid.innerHTML = products.map(p => `
    <div class="product-card">
      <img src="${p.img}" alt="${p.name}">
      <h3 style="margin-bottom: 10px; color: var(--cream); font-size: 14px;">${p.name}</h3>
      <label style="color: var(--muted); font-size: 11px;">Prix (DHS)</label>
      <input type="number" value="${p.price}" onchange="updatePrice(${p.id}, this.value)">
      <label style="color: var(--muted); font-size: 11px;">Stock</label>
      <input type="number" value="${p.stock}" onchange="updateStock(${p.id}, this.value)">
      <button onclick="editProduct(${p.id})">Éditer</button>
      <button onclick="deleteProduct(${p.id})" style="background: var(--error);">Supprimer</button>
    </div>
  `).join('');
}

function editProduct(id) {
  const products = getProducts();
  const product = products.find(p => p.id === id);
  editingProductId = id;
  productImages = [];
  document.getElementById('modal-title').textContent = 'Éditer le Produit';
  document.getElementById('prod-name').value = product.name;
  document.getElementById('prod-category').value = product.cat;
  document.getElementById('prod-price').value = product.price;
  document.getElementById('prod-stock').value = product.stock;
  document.getElementById('prod-desc').value = product.desc || '';
  document.getElementById('product-modal').classList.add('active');
}

function updatePrice(id, newPrice) {
  const products = getProducts();
  const product = products.find(p => p.id === id);
  if (product) {
    product.price = parseInt(newPrice);
    saveProducts(products);
  }
}

function updateStock(id, newStock) {
  const products = getProducts();
  const product = products.find(p => p.id === id);
  if (product) {
    product.stock = parseInt(newStock);
    saveProducts(products);
  }
}

function deleteProduct(id) {
  if (confirm('Êtes-vous sûr?')) {
    const products = getProducts().filter(p => p.id !== id);
    saveProducts(products);
    loadProducts();
  }
}

function loadOrders() {
  const ordersJson = localStorage.getItem('hermabi_orders');
  const orders = ordersJson ? JSON.parse(ordersJson) : [];
  const container = document.getElementById('orders-container');
  if (orders.length === 0) {
    container.innerHTML = '<p style="color: var(--muted);">Aucune commande</p>';
    return;
  }
  let html = '<table class="orders-table"><thead><tr><th>N° Commande</th><th>Client</th><th>Téléphone</th><th>Adresse</th><th>Produits</th><th>Total</th><th>Paiement</th></tr></thead><tbody>';
  orders.reverse().forEach(o => {
    const productsHtml = o.items.map(item => `<div class="item-box"><strong>${item.name}</strong><br>Taille: ${item.size || 'N/A'} | Quantité: ${item.qty} | ${item.price} DHS</div>`).join('');
    html += `<tr><td><strong>${o.id}</strong></td><td>${o.customer.fullname}</td><td>${o.customer.phone}</td><td>${o.customer.address}, ${o.customer.city}</td><td>${productsHtml}</td><td><strong style="color: var(--brass);">${o.total} DHS</strong></td><td>${o.paymentMethod === 'cod' ? '💵 À la livraison' : '💬 WhatsApp'}</td></tr>`;
  });
  html += '</tbody></table>';
  container.innerHTML = html;
}

if (sessionStorage.getItem('admin_logged_in') === 'true') {
  showDashboard();
} else {
  showLogin();
}
</script>
</body>
</html>
