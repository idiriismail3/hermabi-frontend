<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard — Hermabi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --stucco: #121110;
  --stucco-dim: #1B1815;
  --ink: #0A0908;
  --text: #EFE6D3;
  --brass: #C9A227;
  --cream: #F4ECDD;
  --line: #3A3327;
  --muted: #B8AD97;
  --error: #9C3B34;
}
body { font-family: 'Work Sans', sans-serif; background: var(--stucco); color: var(--text); }
.login-screen { display: flex; align-items: center; justify-content: center; height: 100vh; background: linear-gradient(135deg, var(--stucco) 0%, var(--stucco-dim) 100%); }
.login-box { background: var(--stucco-dim); padding: 40px; border-radius: 12px; width: 100%; max-width: 400px; border: 1px solid var(--line); }
.login-box h1 { font-size: 28px; color: var(--brass); margin-bottom: 30px; text-align: center; }
.login-box input { width: 100%; padding: 12px; margin-bottom: 15px; background: var(--stucco); border: 1px solid var(--line); border-radius: 6px; color: var(--text); }
.login-box button { width: 100%; padding: 12px; background: var(--brass); color: var(--ink); border: none; border-radius: 6px; font-weight: 600; cursor: pointer; }
.dashboard { display: none; }
.dashboard.active { display: block; }
.header { background: var(--stucco-dim); padding: 20px 30px; border-bottom: 1px solid var(--line); display: flex; justify-content: space-between; align-items: center; }
.header h1 { color: var(--brass); }
.logout-btn { background: var(--error); color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; }
.nav-tabs { display: flex; background: var(--stucco-dim); padding: 0 30px; border-bottom: 1px solid var(--line); gap: 30px; }
.nav-tab { padding: 15px 0; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; font-weight: 600; }
.nav-tab.active { color: var(--brass); border-bottom-color: var(--brass); }
.content { padding: 30px; display: none; }
.content.active { display: block; }
.products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; }
.product-card { background: var(--stucco-dim); padding: 20px; border-radius: 8px; border: 1px solid var(--line); }
.product-card img { width: 100%; height: 150px; object-fit: cover; border-radius: 6px; margin-bottom: 15px; }
.product-card input { width: 100%; padding: 8px; margin-bottom: 10px; background: var(--stucco); border: 1px solid var(--line); border-radius: 4px; color: var(--text); }
.product-card button { width: 100%; padding: 10px; background: var(--brass); color: var(--ink); border: none; border-radius: 4px; cursor: pointer; font-weight: 600; }
.orders-table { width: 100%; border-collapse: collapse; background: var(--stucco-dim); border: 1px solid var(--line); }
.orders-table th { background: var(--ink); padding: 15px; text-align: left; color: var(--brass); font-weight: 700; border-bottom: 1px solid var(--line); font-size: 12px; }
.orders-table td { padding: 15px; border-bottom: 1px solid var(--line); font-size: 13px; }
.orders-table tr:hover { background: rgba(201, 162, 39, 0.1); }
.item-box { background: rgba(201,162,39,0.1); padding: 10px; border-radius: 4px; margin: 5px 0; font-size: 12px; }
</style>
</head>
<body>

<div id="login-screen" class="login-screen">
  <div class="login-box">
    <h1>Hermabi Admin</h1>
    <input type="password" id="login-password" placeholder="Mot de passe">
    <button onclick="login()">Connexion</button>
    <div id="login-error" style="color: var(--error); margin-top: 10px;"></div>
  </div>
</div>

<div id="dashboard" class="dashboard">
  <div class="header">
    <h1>Admin Dashboard</h1>
    <button class="logout-btn" onclick="logout()">Déconnexion</button>
  </div>

  <div class="nav-tabs">
    <div class="nav-tab active" onclick="switchTab('products')">📦 Produits</div>
    <div class="nav-tab" onclick="switchTab('orders')">📋 Commandes</div>
  </div>

  <div id="products-tab" class="content active">
    <h2 style="color: var(--brass); margin-bottom: 20px;">Gestion des Produits</h2>
    <div class="products-grid" id="products-grid"></div>
  </div>

  <div id="orders-tab" class="content">
    <h2 style="color: var(--brass); margin-bottom: 20px;">Toutes les Commandes</h2>
    <div id="orders-container"></div>
  </div>
</div>

<script src="js/store.js"></script>
<script>
const ADMIN_PASSWORD = 'hermabi2024';

function checkLogin() {
  if (sessionStorage.getItem('admin_logged_in') === 'true') {
    showDashboard();
  } else {
    showLogin();
  }
}

function login() {
  const password = document.getElementById('login-password').value;
  if (password === ADMIN_PASSWORD) {
    sessionStorage.setItem('admin_logged_in', 'true');
    showDashboard();
  } else {
    document.getElementById('login-error').textContent = 'Mot de passe incorrect';
  }
}

function logout() {
  sessionStorage.removeItem('admin_logged_in');
  showLogin();
  document.getElementById('login-password').value = '';
}

function showLogin() {
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('dashboard').classList.remove('active');
}

function showDashboard() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('dashboard').classList.add('active');
  loadProducts();
  loadOrders();
}

function switchTab(tab) {
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById(tab + '-tab').classList.add('active');
}

function loadProducts() {
  const products = getProducts();
  const grid = document.getElementById('products-grid');
  grid.innerHTML = products.map(p => `
    <div class="product-card">
      <img src="${p.img}" alt="${p.name}">
      <h3 style="margin-bottom: 10px; color: var(--cream);">${p.name}</h3>
      <label style="color: var(--muted); font-size: 11px;">Prix (DHS)</label>
      <input type="number" value="${p.price}" onchange="updatePrice(${p.id}, this.value)">
      <label style="color: var(--muted); font-size: 11px;">Stock</label>
      <input type="number" value="${p.stock}" onchange="updateStock(${p.id}, this.value)">
      <button onclick="deleteProduct(${p.id})">Supprimer</button>
    </div>
  `).join('');
}

function updatePrice(id, newPrice) {
  const products = getProducts();
  const product = products.find(p => p.id === id);
  if (product) {
    product.price = parseInt(newPrice);
    saveProducts(products);
    alert('Prix mis à jour');
  }
}

function updateStock(id, newStock) {
  const products = getProducts();
  const product = products.find(p => p.id === id);
  if (product) {
    product.stock = parseInt(newStock);
    saveProducts(products);
    alert('Stock mis à jour');
  }
}

function deleteProduct(id) {
  if (confirm('Êtes-vous sûr?')) {
    const products = getProducts().filter(p => p.id !== id);
    saveProducts(products);
    loadProducts();
  }
}

function loadOrders() {
  const ordersJson = localStorage.getItem('hermabi_orders');
  const orders = ordersJson ? JSON.parse(ordersJson) : [];
  const container = document.getElementById('orders-container');
  
  if (orders.length === 0) {
    container.innerHTML = '<p style="color: var(--muted);">Aucune commande</p>';
    return;
  }
  
  let html = '<table class="orders-table"><thead><tr><th>N° Commande</th><th>Client</th><th>Téléphone</th><th>Adresse</th><th>Produits</th><th>Total</th><th>Paiement</th></tr></thead><tbody>';
  
  orders.reverse().forEach(o => {
    const productsHtml = o.items.map(item => 
      `<div class="item-box"><strong>${item.name}</strong><br>Taille: ${item.size || 'N/A'} | Quantité: ${item.qty} | ${item.price} DHS</div>`
    ).join('');
    
    html += `<tr>
      <td><strong>${o.id}</strong></td>
      <td>${o.customer.fullname}</td>
      <td>${o.customer.phone}</td>
      <td>${o.customer.address}, ${o.customer.city}</td>
      <td>${productsHtml}</td>
      <td><strong style="color: var(--brass);">${o.total} DHS</strong></td>
      <td>${o.paymentMethod === 'cod' ? '💵 À la livraison' : o.paymentMethod === 'whatsapp' ? '💬 WhatsApp' : '💳 Carte'}</td>
    </tr>`;
  });
  
  html += '</tbody></table>';
  container.innerHTML = html;
}

checkLogin();
</script>
</body>
</html>
